# Publishes the package to npm.
# On every push to main it auto-bumps the patch version, commits + tags the
# bump back to the repo, and publishes to npm. The bump commit is marked
# [skip ci] so it doesn't trigger this workflow again.

name: Node.js Package

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the job to push the version-bump commit and tag back to the repo.
permissions:
  contents: write

# Never run two publishes at once (avoids racing version bumps).
concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - run: npm ci

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump patch version + package-lock, create the "vX.Y.Z" commit and tag.
      # [skip ci] on the commit prevents this push from re-triggering the run.
      - name: Bump patch version
        run: 'npm version patch -m "chore: release v%s [skip ci]"'

      - name: Push version bump and tag
        run: git push --follow-tags

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
